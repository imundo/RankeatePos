# Docker profile for bff-gateway
# Uses environment variables from docker-compose.yml

spring:
  application:
    name: bff-gateway

# Service URLs for Docker environment
services:
  auth:
    url: http://auth-service:8081
  catalog:
    url: http://catalog-service:8082
  sales:
    url: http://sales-service:8083
  marketing:
    url: http://marketing-service:8093

server:
  port: 8080

logging:
  level:
    com.poscl: INFO
    org.springframework.web: INFO


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
