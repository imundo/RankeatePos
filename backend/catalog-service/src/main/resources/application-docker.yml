# Docker profile for catalog-service
# Uses environment variables from docker-compose.yml

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:catalog_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 2
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

logging:
  level:
    com.poscl: INFO


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}